<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Airo · Experience</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Tokens ─────────────────────────────── */
    :root {
      --red:    #c41230;
      --green:  #1a6b3c;
      --white:  #ffffff;
      --black:  #0a0a0a;
      --serif:  'Cormorant Garamond', Georgia, serif;
      --sans:   'Inter', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: var(--white);
      font-family: var(--sans);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ══════════════════════════════
       LOADING
    ══════════════════════════════ */
    #loading {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--white);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2.5rem;
      transition: opacity .7s ease, visibility .7s ease;
    }
    #loading.gone { opacity: 0; visibility: hidden; pointer-events: none; }

    .loading-logos {
      display: flex; flex-direction: column;
      align-items: center; gap: 1.2rem;
    }
    .loading-logos img {
      height: 70px; width: auto;
      object-fit: contain;
      opacity: 0;
      animation: fade-in .8s ease forwards;
    }
    .loading-logos img:first-child { animation-delay: .2s; }
    .loading-logos img:last-child  { animation-delay: .5s; }
    @keyframes fade-in { to { opacity: 1; } }

    .logo-divider {
      width: 1px; height: 32px;
      background: linear-gradient(to bottom, var(--red), var(--green));
      opacity: .4;
    }

    .sweep-bar {
      width: 100px; height: 1px;
      background: #eee; position: relative; overflow: hidden;
    }
    .sweep-bar::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, var(--red), var(--green));
      transform: translateX(-100%);
      animation: sweep 1.4s ease-in-out infinite;
    }
    @keyframes sweep { to { transform: translateX(100%); } }

    .loading-text {
      font-family: var(--serif); font-weight: 300;
      font-size: 1.1rem; letter-spacing: .22em;
      text-transform: uppercase; color: #888;
    }

    /* ══════════════════════════════
       PERMISSION / SPLASH SCREEN
    ══════════════════════════════ */
    #permission {
      display: none;
      position: fixed; inset: 0; z-index: 700;
      background: var(--white);
      flex-direction: column; align-items: center;
      justify-content: space-between;
      padding: max(env(safe-area-inset-top),3rem) 2rem max(env(safe-area-inset-bottom),3rem);
      text-align: center;
    }
    #permission.show { display: flex; }

    /* Top logos */
    .splash-logos {
      display: flex; flex-direction: column;
      align-items: center; gap: 1.4rem;
      padding-top: 1rem;
    }
    .splash-logos img {
      height: 80px; width: auto; object-fit: contain;
    }
    .splash-logo-sep {
      width: 40px; height: 1px;
      background: linear-gradient(90deg, var(--red), var(--green));
    }

    /* Middle text */
    .splash-body {
      display: flex; flex-direction: column;
      align-items: center; gap: 1.2rem;
    }
    .splash-eyebrow {
      font-size: .65rem; letter-spacing: .32em;
      text-transform: uppercase; color: var(--green);
      font-weight: 500;
    }
    .splash-title {
      font-family: var(--serif); font-weight: 300;
      font-size: clamp(2.4rem, 8vw, 3.2rem);
      color: var(--black); letter-spacing: .04em;
      line-height: 1.15;
    }
    .splash-title em { color: var(--red); font-style: normal; }
    .splash-divider {
      width: 36px; height: 1px;
      background: linear-gradient(90deg, var(--red), var(--green));
    }
    .splash-desc {
      font-size: .85rem; color: #666;
      line-height: 1.8; font-weight: 300;
      max-width: 260px;
    }

    /* Launch button */
    .btn-launch {
      display: flex; align-items: center;
      justify-content: center; gap: .7rem;
      width: 100%; max-width: 280px;
      padding: 1.05rem 2rem;
      background: var(--red);
      color: var(--white);
      font-size: .8rem; font-weight: 500;
      letter-spacing: .2em; text-transform: uppercase;
      border: none; border-radius: 999px; cursor: pointer;
      box-shadow: 0 10px 36px rgba(196,18,48,.32);
      transition: all .25s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-launch:active { transform: scale(.97); }

    /* ══════════════════════════════
       DESKTOP
    ══════════════════════════════ */
    #desktop {
      display: none;
      position: fixed; inset: 0; z-index: 800;
      background: var(--white);
      flex-direction: column; align-items: center;
      justify-content: center; gap: 2rem;
      padding: 3rem 2rem; text-align: center;
    }
    #desktop.show { display: flex; }
    .desk-logos { display: flex; align-items: center; gap: 2rem; }
    .desk-logos img { height: 60px; width: auto; object-fit: contain; }
    .desk-sep { width: 1px; height: 50px; background: #ddd; }
    .desk-title {
      font-family: var(--serif); font-size: 2.4rem;
      font-weight: 300; color: var(--black); letter-spacing: .06em;
    }
    .desk-card {
      border: 1px solid #eee; border-radius: 1.2rem;
      padding: 2rem; max-width: 380px; width: 100%;
    }
    .desk-card p { color: #555; font-size: .88rem; line-height: 1.8; font-weight: 300; }
    .desk-url { font-size: .7rem; color: var(--red); word-break: break-all; margin-top: .8rem; }

    /* ══════════════════════════════
       AR VIEW — PURE FULLSCREEN
    ══════════════════════════════ */
    #ar-view {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: #000;
    }
    #ar-view.show { display: block; }

    /* Camera background */
    #cam {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* YOUR VIDEO — 100% fullscreen, no overlays when playing */
    #my-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      /* Hidden until we fade it in */
      opacity: 0;
      transition: opacity .5s ease;
    }
    #my-video.visible { opacity: 1; }

    /* ── Controls overlay (tap to show/hide) ── */
    #controls {
      position: absolute; inset: 0; z-index: 200;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding: 0 0 max(env(safe-area-inset-bottom), 2.5rem);
      background: linear-gradient(to top,
        rgba(0,0,0,0.65) 0%,
        rgba(0,0,0,0.12) 35%,
        transparent 60%);
      /* Controls visible by default, fade on play */
      opacity: 1;
      transition: opacity .4s ease;
      pointer-events: auto;
    }
    #controls.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .ctrl-btns {
      display: flex; gap: .9rem; align-items: center;
      padding: 0 1.5rem 1rem;
      width: 100%;
    }
    #play-btn {
      flex: 1;
      padding: 1rem;
      background: var(--red);
      color: var(--white);
      font-size: .8rem; font-weight: 500;
      letter-spacing: .18em; text-transform: uppercase;
      border: none; border-radius: .9rem; cursor: pointer;
      box-shadow: 0 6px 22px rgba(196,18,48,.45);
      -webkit-tap-highlight-color: transparent;
      transition: transform .2s;
    }
    #play-btn:active { transform: scale(.96); }

    #exit-btn {
      padding: 1rem 1.4rem;
      background: rgba(255,255,255,.12);
      color: rgba(255,255,255,.85);
      font-size: .76rem; font-weight: 500;
      letter-spacing: .15em; text-transform: uppercase;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: .9rem; cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-tap-highlight-color: transparent;
      transition: background .2s;
    }
    #exit-btn:active { background: rgba(255,255,255,.25); }

    /* Tap hint (shows briefly) */
    #tap-hint {
      position: absolute; bottom: calc(max(env(safe-area-inset-bottom),2.5rem) + 90px);
      left: 50%; transform: translateX(-50%);
      font-size: .65rem; letter-spacing: .2em;
      text-transform: uppercase;
      color: rgba(255,255,255,.45);
      white-space: nowrap;
      pointer-events: none;
      transition: opacity .4s ease;
    }
    #tap-hint.gone { opacity: 0; }
  </style>
</head>
<body>

<!-- ══════════ LOADING ══════════ -->
<div id="loading">
  <div class="loading-logos">
    <img src="media/logo-essentials.png" alt="Airo Essentials" />
    <div class="logo-divider"></div>
    <img src="media/logo-health.png" alt="Airo Health" />
  </div>
  <div class="sweep-bar"></div>
  <div class="loading-text">Airo Experience</div>
</div>

<!-- ══════════ DESKTOP ══════════ -->
<div id="desktop">
  <div class="desk-logos">
    <img src="media/logo-essentials.png" alt="Airo Essentials" />
    <div class="desk-sep"></div>
    <img src="media/logo-health.png" alt="Airo Health" />
  </div>
  <div class="desk-title">Airo Experience</div>
  <div class="desk-card">
    <p>Scan the QR code with your phone camera to launch the Airo AR experience instantly. No app required.</p>
    <p class="desk-url" id="page-url-el"></p>
  </div>
</div>

<!-- ══════════ PERMISSION / SPLASH ══════════ -->
<div id="permission">

  <!-- Top: Both logos -->
  <div class="splash-logos">
    <img src="media/logo-essentials.png" alt="Airo Essentials" />
    <div class="splash-logo-sep"></div>
    <img src="media/logo-health.png" alt="Airo Health" />
  </div>

  <!-- Middle: tagline -->
  <div class="splash-body">
    <div class="splash-eyebrow">Augmented Reality</div>
    <h1 class="splash-title">
      Airo<br><em>Experience</em><br>Awaits
    </h1>
    <div class="splash-divider"></div>
    <p class="splash-desc">
      Your video plays immersively in fullscreen.<br>
      Enjoy the experience.
    </p>
  </div>

  <!-- Bottom: Launch button -->
  <button class="btn-launch" onclick="launchAR()">
    <span>◉</span> Launch Experience
  </button>

</div>

<!-- ══════════ AR VIEW ══════════ -->
<div id="ar-view">

  <!-- No camera background needed -->

  <!-- Fullscreen video (YOUR video — no overlays when playing) -->
  <video id="my-video"
         src="media/final.mp4"
         loop
         playsinline
         webkit-playsinline
         preload="auto">
  </video>

  <!-- Controls — tap screen to toggle show/hide -->
  <div id="controls" onclick="handleTap()">
    <div id="tap-hint">Tap screen to show controls</div>
    <div class="ctrl-btns">
      <button id="play-btn" onclick="togglePlay(event)">▶ &nbsp;Play</button>
      <button id="exit-btn" onclick="exitAR(event)">✕ &nbsp;Exit</button>
    </div>
  </div>

</div>

<script>
const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
let playing      = false;
let muted        = false;
let hideTimer    = null;
let controlsVisible = true;

const $loading    = document.getElementById('loading');
const $desktop    = document.getElementById('desktop');
const $permission = document.getElementById('permission');
const $arView     = document.getElementById('ar-view');
const $cam        = document.getElementById('cam');
const $myVideo    = document.getElementById('my-video');
const $playBtn    = document.getElementById('play-btn');
const $controls   = document.getElementById('controls');
const $tapHint    = document.getElementById('tap-hint');
const $pageUrlEl  = document.getElementById('page-url-el');

// ── Init ──────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if ($pageUrlEl) $pageUrlEl.textContent = location.href;
  setTimeout(() => {
    $loading.classList.add('gone');
    if (!isMobile) { $desktop.classList.add('show'); return; }
    $permission.classList.add('show');
  }, 2200);
});

// ── Launch Experience ─────────────────────────────────────────
async function launchAR() {
  $permission.classList.remove('show');
  $arView.classList.add('show');

  // Show video (fade in)
  $myVideo.classList.add('visible');
  scheduleHideControls();
}

// ── Tap to toggle controls ────────────────────────────
function handleTap() {
  if (controlsVisible) {
    hideControls();
  } else {
    showControls();
    scheduleHideControls();
  }
}

function showControls() {
  $controls.classList.remove('hidden');
  $tapHint.classList.remove('gone');
  controlsVisible = true;
}

function hideControls() {
  if (!playing) return; // Don't hide if paused
  $controls.classList.add('hidden');
  controlsVisible = false;
  clearTimeout(hideTimer);
}

function scheduleHideControls() {
  clearTimeout(hideTimer);
  if (playing) {
    hideTimer = setTimeout(hideControls, 3500);
  }
}

// ── Play / Pause ──────────────────────────────────────
function togglePlay(e) {
  if (e) e.stopPropagation();

  if (playing) {
    $myVideo.pause();
    playing = false;
    $playBtn.innerHTML = '▶ &nbsp;Play';
    showControls();    // Always show controls when paused
    clearTimeout(hideTimer);
  } else {
    $myVideo.muted = false;
    $myVideo.play()
      .then(() => {
        playing = true;
        $playBtn.innerHTML = '⏸ &nbsp;Pause';
        scheduleHideControls(); // Hide UI after 3.5s of playing
      })
      .catch(() => {
        // Autoplay policy — try muted
        $myVideo.muted = true;
        $myVideo.play().then(() => {
          playing = true;
          $playBtn.innerHTML = '⏸ &nbsp;Pause';
          scheduleHideControls();
        });
      });
  }
}

// ── Exit AR ───────────────────────────────────────────
function exitAR(e) {
  if (e) e.stopPropagation();
  $myVideo.pause();
  $myVideo.classList.remove('visible');
  playing = false;
  $playBtn.innerHTML = '▶ &nbsp;Play';
  showControls();
  clearTimeout(hideTimer);

  if (window.$cam && $cam.srcObject) {
    $cam.srcObject.getTracks().forEach(t => t.stop());
    $cam.srcObject = null;
  }
  $arView.classList.remove('show');
  isMobile ? $permission.classList.add('show') : $desktop.classList.add('show');
}
</script>
</body>
</html>
